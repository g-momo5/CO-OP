<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CO-OP">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>CO-OP Mobile</title>
  <link rel="icon" href="/assets/logo_cpc.png">
  <link rel="apple-touch-icon" href="/mobile-assets/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/mobile-assets/apple-touch-icon.png">
  <link rel="manifest" href="/mobile/manifest.webmanifest?v=20260718-ios-refresh">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/mobile-assets/mobile.css?v=20260718-land-mobile-max-content-rows">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="header-top">
        <h1 class="app-title">محطة بنزين سمنود - الجمعية التعاونية للبترول</h1>
      </div>
    </header>

    <main class="main-content">
      <div id="content" class="content">
        <div class="loading">جار التحميل...</div>
      </div>
    </main>

    <nav class="tabs bottom-navigation" aria-label="Mobile sections">
      <div class="mobile-module-switch" aria-label="اختيار النظام">
        <button type="button" class="active" data-module="fuel" aria-label="محطة البنزين">
          <img src="/assets/logo_cpc.png" alt="">
        </button>
        <button type="button" data-module="land" aria-label="الأراضي">
          <span aria-hidden="true">🌾</span>
        </button>
      </div>
      <span class="mobile-nav-separator" aria-hidden="true">|</span>
      <button class="active" data-view="overview"><span>🏠</span>الرئيسية</button>
      <button data-view="sales-summary"><span>📊</span>ملخص المبيعات</button>
      <button data-view="profit"><span>📈</span>المكسب</button>
      <button data-view="expenses"><span>📉</span>المصاريف</button>
      <button data-view="annual-inventory"><span>📒</span>جرد سنوي</button>
      <button data-view="shift-day-summaries"><span>📋</span>سجل الورديات</button>
      <button class="land-tab" data-view="land-dashboard"><span>🌾</span>الأراضي</button>
      <button class="land-tab" data-view="land-plots"><span>📍</span>قطع الأرض</button>
      <button class="land-tab" data-view="land-tenants"><span>👥</span>المستأجرون</button>
      <button class="land-tab" data-view="land-reports"><span>📋</span>تقارير</button>
    </nav>
  </div>

  <dialog id="shiftSummaryDialog" class="mobile-modal">
    <div class="mobile-modal-panel">
      <button id="closeShiftSummaryDialog" class="modal-close" type="button" aria-label="Close">×</button>
      <div id="shiftSummaryDialogBody"></div>
    </div>
  </dialog>

  <script src="/mobile-assets/mobile.js?v=20260718-land-mobile-max-content-rows"></script>
</body>
</html>
