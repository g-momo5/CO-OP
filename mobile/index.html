<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO-OP Mobile</title>
  <link rel="stylesheet" href="/mobile-assets/mobile.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CO-OP</p>
        <h1>متابعة المحطة</h1>
      </div>
      <div class="status-pill">Solo lettura</div>
    </header>

    <section class="sync-card">
      <div>
        <span>آخر تحديث</span>
        <strong id="lastSync">-</strong>
      </div>
      <div>
        <span>الوضع</span>
        <strong>مشاهدة فقط</strong>
      </div>
    </section>

    <nav class="tabs" aria-label="Mobile sections">
      <button class="active" data-view="overview">الرئيسية</button>
      <button data-view="shifts">الورديات</button>
      <button data-view="report">التقرير</button>
      <button data-view="charts">الرسوم</button>
      <button data-view="stock">المخزن</button>
      <button data-view="safe-book">الخزنة</button>
      <button data-view="profit">الأرباح</button>
      <button data-view="prices">الأسعار</button>
    </nav>

    <main id="content" class="content">
      <div class="loading">جار التحميل...</div>
    </main>
  </div>

  <dialog id="shiftDialog" class="shift-dialog">
    <button id="closeShiftDialog" class="icon-button" aria-label="Close">×</button>
    <div id="shiftDetail"></div>
  </dialog>

  <script src="/mobile-assets/mobile.js"></script>
</body>
</html>
